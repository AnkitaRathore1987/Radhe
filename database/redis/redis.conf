# Mini-Aladdin Redis Configuration
# ==================================

# Memory
maxmemory 8gb
maxmemory-policy allkeys-lru

# Persistence — both RDB and AOF
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Performance
hz 100
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
logfile /data/redis.log

# Security — password set via docker-compose env
# requirepass set by REDIS_PASSWORD env var

# Network
bind 127.0.0.1
protected-mode yes
